# การตั้งค่าระบบ 
network:
  base_url: "http://192.168.4.1"  # ตั้ง IP ให้ตรงกับตัวบอร์ด

storage:
  file_path: "data_log.csv"

app_settings:
  interval: 5             # บันทึกทุกๆ กี่วินาที
  sun_start: "07:00"
  sun_end: "18:00"

energy_budget:
  max_run_time: 300       # รันสูงสุดไม่เกิน 5 นาที (ถ้ากินถึง 20A)
  base_cooldown: 1500     # พักพื้นฐาน 25 นาที
  critical_current: 20.0  # สั่งตัดที่ 20
